<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card — Back</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Cormorant Garamond', 'Garamond', 'Georgia', serif; }
  .card {
    width: 1050px;
    height: 600px;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
  }
  .monogram {
    width: 180px;
    height: 180px;
  }
  .monogram img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .title {
    font-size: 16.5px;
    color: #222;
    letter-spacing: 4.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="monogram">
      <img src="og-image.png" alt="JM Monogram" />
    </div>
    <div class="title">Strategy & Operations</div>
  </div>
</body>
</html>
